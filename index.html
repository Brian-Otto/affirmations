<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affira</title>
  <meta name="description" content="Tägliche Affirmationen für dich!" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="mask-icon" href="/mask-icon.svg" color="#FFFFFF" />
  <meta name="theme-color" content="#ffffff" />
  <script>
    // loading the theme and setting the right ctp theme
    const theme = localStorage.getItem("theme");

    const root = document.documentElement;

    root.classList.remove("latte", "mocha", "dark");

    if (theme === "light") {
      root.classList.add("latte");
      localStorage.setItem("theme", "light");
    } else if (theme === "dark") {
      root.classList.add("mocha", "dark");
      localStorage.setItem("theme", "dark");
    } else {
      localStorage.removeItem("theme");
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (prefersDark) {
        root.classList.add("mocha", "dark");
      } else {
        root.classList.add("latte");
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
